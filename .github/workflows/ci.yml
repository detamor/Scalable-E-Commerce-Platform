name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ──────────────────────────────────────────────
  # Lint: Check code quality across all services
  # ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - user-service
          - product-service
          - cart-service
          - order-service
          - payment-service
          - notification-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: ${{ matrix.service }}

  # ──────────────────────────────────────────────
  # Test: Run unit tests for all services
  # ──────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        service:
          - user-service
          - product-service
          - order-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Download dependencies
        working-directory: ${{ matrix.service }}
        run: go mod download

      - name: Run tests
        working-directory: ${{ matrix.service }}
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Display coverage
        working-directory: ${{ matrix.service }}
        run: go tool cover -func=coverage.out

  # ──────────────────────────────────────────────
  # Build: Verify all Docker images build successfully
  # ──────────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build user-service
        uses: docker/build-push-action@v6
        with:
          context: ./user-service
          push: false
          tags: user-service:test

      - name: Build product-service
        uses: docker/build-push-action@v6
        with:
          context: ./product-service
          push: false
          tags: product-service:test

      - name: Build cart-service
        uses: docker/build-push-action@v6
        with:
          context: ./cart-service
          push: false
          tags: cart-service:test

      - name: Build order-service
        uses: docker/build-push-action@v6
        with:
          context: ./order-service
          push: false
          tags: order-service:test

      - name: Build payment-service
        uses: docker/build-push-action@v6
        with:
          context: ./payment-service
          push: false
          tags: payment-service:test

      - name: Build notification-service
        uses: docker/build-push-action@v6
        with:
          context: ./notification-service
          push: false
          tags: notification-service:test
